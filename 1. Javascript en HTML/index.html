<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso De Javascript</title>
</head>


<body>
    
    <h1>¿Que es lo que puedo hacer con javascript?</h1>
    <p id="demostracion">Este texto sera transformado por javascript</p>

    <!-- Javascript Inline-->
    <button onclick="document.getElementById('demostracion').innerHTML = '¡Texto transformado!'">Usar Javascript</button>

    <!-- Javascript en archivo externo -->
    <p id="externalButton">Usar Javascript Externo</p>
    <script src="script.js"></script>
</body>
</html>
